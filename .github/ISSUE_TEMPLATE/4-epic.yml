name: Epic
description: A large piece of work spanning several issues, often across repos
type: Epic
body:
  - type: markdown
    attributes:
      value: |
        Open epics in the project's main/umbrella repo, then add sub-issues in the
        relevant repos and group them with a shared release/milestone on the board.
  - type: textarea
    id: goal
    attributes: { label: Goal / outcome }
    validations: { required: true }
  - type: input
    id: release
    attributes: { label: Target release / milestone (optional) }
