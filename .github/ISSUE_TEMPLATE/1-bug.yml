name: Bug
description: Something isn't working as expected
type: Bug
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations: { required: true }
  - type: textarea
    id: repro
    attributes: { label: Steps to reproduce }
  - type: input
    id: versions
    attributes:
      label: Version / environment (if relevant)
      description: "Release tag, commit, device/OS, or component versions — whatever applies. Leave blank if not."
